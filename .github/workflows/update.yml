name: Daily Content Update

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Update GitHub trending projects
        run: node scripts/update-content.mjs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "AI Universe Bot"
          git config user.email "bot@ai.gamewayz.com"
          git add src/data/aiData.ts
          git commit -m "chore: daily content update"
          git push
